<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pysium</title>
  <link rel="icon" id="cloak-favicon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html,body{margin:0;padding:0;background:#071209;height:100%;overflow:hidden}
    #home-page{display:flex}
    #frame-container{display:none;flex:1;position:relative;overflow:hidden}
    #frame-container iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
  </style>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<!-- TAB BAR -->
<div id="tab-bar">
  <div id="tab-list"></div>
  <button id="new-tab-btn" title="New Tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- MAIN SHELL -->
<div id="main-shell">

  <div id="top-bar">
    <button class="top-btn" id="home-btn" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    </button>
    <button class="top-btn" id="back-btn" title="Back" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="top-btn" id="forward-btn" title="Forward" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="top-btn" id="reload-btn" title="Reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
    </button>
    <div id="address-bar-wrap">
      <span id="lock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>
      <input id="address-bar" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false" />
    </div>
    <button class="top-btn" id="fullscreen-btn" title="Fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </button>
    <button class="top-btn" id="panic-btn" title="Panic — Alt+X">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </button>
  </div>

  <!-- HOME PAGE -->
  <div id="home-page">
    <div id="home-inner">
      <div id="wordmark">pysium</div>
      <p id="home-sub">your private window to the web</p>

      <form id="sj-form">
        <div id="search-wrap">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="sj-address" type="text" placeholder="Search the web freely…" autocomplete="off" spellcheck="false" />
        </div>
      </form>

      <div id="shortcuts">
        <a class="shortcut" data-url="https://www.youtube.com" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 00.5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg></div><span>YouTube</span></a>
        <a class="shortcut" data-url="https://www.reddit.com" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 01-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 01.042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 014.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 01.14-.197.35.35 0 01.238-.042l2.906.617a1.214 1.214 0 011.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 00-.231.094.33.33 0 000 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 00.029-.463.33.33 0 00-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 00-.232-.095z"/></svg></div><span>Reddit</span></a>
        <a class="shortcut" data-url="https://x.com" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div><span>X</span></a>
        <a class="shortcut" data-url="https://discord.com/app" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg></div><span>Discord</span></a>
        <a class="shortcut" data-url="https://www.instagram.com" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></div><span>Instagram</span></a>
        <a class="shortcut" data-url="https://www.tiktok.com" href="#"><div class="shortcut-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></div><span>TikTok</span></a>
      </div>

      <div id="widgets-row">
        <div class="widget" id="weather-widget" title="Click for weather">
          <div id="weather-loading" class="widget-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="22" height="22"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <span>Click for weather</span>
          </div>
          <div id="weather-data" class="widget-inner hidden">
            <div id="weather-icon-wrap"></div>
            <div class="widget-text">
              <span id="weather-temp" class="widget-val">--°</span>
              <span id="weather-desc" class="widget-sub">--</span>
              <span id="weather-city" class="widget-sub2">--</span>
            </div>
          </div>
        </div>
        <div class="widget" id="battery-widget">
          <div class="widget-inner">
            <svg viewBox="0 0 40 18" fill="none" xmlns="http://www.w3.org/2000/svg" width="40" height="18">
              <rect x="0.75" y="0.75" width="35.5" height="16.5" rx="3.25" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.45"/>
              <rect id="batt-fill" x="2.5" y="2.5" width="31" height="13" rx="1.5" fill="#6ee7b7"/>
              <path d="M38 7v4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55"/>
            </svg>
            <div class="widget-text">
              <span id="batt-pct" class="widget-val">--%</span>
              <span id="batt-status" class="widget-sub">Battery</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- frames go here -->
  <div id="frame-container"></div>

</div><!-- /main-shell -->

<!-- SETTINGS PANEL -->
<div id="settings-panel" class="glass-panel hidden">
  <div class="panel-header"><span>Settings</span><button class="panel-close">✕</button></div>
  <div class="stab-bar">
    <button class="stab-btn active" data-tab="cloak">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Cloak
    </button>
    <button class="stab-btn" data-tab="panic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Panic
    </button>
    <button class="stab-btn" data-tab="general">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>General
    </button>
  </div>
  <div class="stab-pane active" id="stab-cloak">
    <label class="toggle-row"><span>Enable cloak</span><input type="checkbox" id="cloak-toggle" checked /></label>
    <label class="toggle-row"><span>Auto-cloak on load</span><input type="checkbox" id="cloak-auto-toggle" checked /></label>
    <div class="field-group"><label>Tab title</label><input type="text" id="cloak-title" placeholder="Pysium" /></div>
    <div class="field-group"><label>Favicon URL</label><input type="text" id="cloak-favicon-url" placeholder="/favicon.ico" /></div>
    <p class="field-label">Quick presets</p>
    <div class="preset-row">
      <button class="preset-btn" data-title="Google Drive" data-favicon="https://drive.google.com/favicon.ico">Drive</button>
      <button class="preset-btn" data-title="Canvas" data-favicon="https://du11hjcvx0uqb.cloudfront.net/br/dist/images/favicon-e10d657a73.ico">Canvas</button>
      <button class="preset-btn" data-title="Classroom" data-favicon="https://ssl.gstatic.com/classroom/favicon.png">Classroom</button>
      <button class="preset-btn" data-title="Google Docs" data-favicon="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">Docs</button>
    </div>
    <button id="cloak-apply" class="apply-btn">Apply &amp; Save</button>
    <button id="ab-cloak-btn" class="apply-btn secondary">Open in about:blank</button>
  </div>
  <div class="stab-pane" id="stab-panic">
    <p class="pane-desc">Panic button or <kbd>Alt+X</kbd> redirects to:</p>
    <div class="field-group"><label>Redirect URL</label><input type="text" id="panic-url-input" value="https://classroom.google.com" /></div>
    <button id="panic-save" class="apply-btn">Save</button>
  </div>
  <div class="stab-pane" id="stab-general">
    <div class="field-group">
      <label>Search engine</label>
      <select id="engine-select">
        <option value="https://www.google.com/search?q=%s">Google</option>
        <option value="https://duckduckgo.com/?q=%s">DuckDuckGo</option>
        <option value="https://search.brave.com/search?q=%s">Brave</option>
        <option value="https://www.bing.com/search?q=%s">Bing</option>
      </select>
    </div>
  </div>
</div>

<div id="fab-row">
  <button id="settings-fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</div>

<div id="overlay" class="hidden"></div>

<!-- scripts at END of body — no defer needed, DOM already exists -->
<script src="register-sw.js"></script>
<script src="/baremux/index.js"></script>
<script src="/scram/scramjet.controller.js"></script>
<script src="index.js"></script>

</body>
</html>
